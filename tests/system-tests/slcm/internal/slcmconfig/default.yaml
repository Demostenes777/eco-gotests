---
# Target kubeconfig path
target_kubeconfig_path: "~/.kube/kubeconfig"
artefact_output_dir: "/tmp"

# Operator Vars
fec_num_aqs_per_groups: "unknown_fec_num_aqs_per_groups"
fec_max_queue_size: "unknown_fec_max_queue_size"
fec_device: "acc100"
pao_page_count: "unknown_pao_page_count"
release_version: "unknown_release"
talm_namespace: "openshift-talm"
talm_num_pods: 1
pci_device: "unknown_pci_device"
sriov_vfs_count: 0
ptp_interface: "Unknown interface"
config_policy: "config-policy"

# VF
test_bbdev_output_file: "/tmp/test_bbdev_output_file.txt"

# Site vars
site_name: "unknown_site"
ssh_port: 22
ocp_api_url: "unknown_api_url"

# Stability
stability_test_duration: "60"
csv_file: "/tmp/stability_footprint.csv.log"
traffic_injection_enabled: false
du_policy_enabled: true

# PTP
ptp_enabled: "false"
ptp_log_time: "5m"
ptp_cfg_file_path: ""
du_ptp_oc_config_name: ""
du_ptp_bc_config_name: ""
ptp_jump_result_pass: ""
ptp_timedout_result_pass: ""

# ptp events
ptp_events_health_pass: "true"
ptp_events_freerun_pass: "true"
ptp_events_error_pass: "true"
ptp_events_getcurrentstate_pass: "true"

# DU
du_static_pvcs: "[]"
du_num_pvs: 0
du_expected_bound_pvs: 0
du_num_pods: 0
du_namespace: "test"
du_sriov_pods: "[]"
du_sriov_networks_name: "[]"

# Spirent
datamodel_path: " "
spirent_vm: " "
spirent_chassis: " "
spirent_ports: [0]
max_packet_loss: 0

# Robust link up/down tests
switch_ping_result: "false"
link_status: "true"

# Operational Procedures
deleted_sites_list: "[]"
sites_list: "[]"
total_policies_count: 4
ocp_version: "Unknown"
bmh_namespace: "cloudranmno-vcu"
bmh_expected_number: 6

# TREX
trex_server_address: " "
trex_server_port: 8080
max_avg_latency: 30
injection_duration: 0.0
expect_failure: false
min_packet_loss: 0.0

traffic_injector: "spirent"

# CU
cu_master_hostnames: "[]"

# eDU
helm_chart_profile: "lb"